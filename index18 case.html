<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JavaScript</title>
</head>

<body>
<script type="text/javascript">
    var input;
    input = prompt('input angka: ');
    var total = 0;
    
    
    while (input != -1) {
        total += Number(input);
        input = prompt('input angka: ');
    }
    
    console.log(total);

</script>

</body>
</html>
