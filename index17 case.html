<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JavaScript</title>
</head>

<body>
<script type="text/javascript">
    var input;
    var total = 0;
    var counter = 0;
    
    
    while (counter < 10) {
        input = prompt('input angka: ');
        total += Number(input);
        counter += 1;
    }
    
    console.log(total);

</script>

</body>
</html>
