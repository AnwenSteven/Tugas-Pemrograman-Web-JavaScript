<!DOCTYPE html>
<html>
<head>
    <title>Task 38: JS DOM Case Study</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
</head>
<body>

<div class="w3-container w3-content w3-padding-32" style="max-width:600px">
    
    <div class="w3-card-4 w3-padding w3-white w3-round">
        <h3 class="w3-center w3-margin-bottom"><b>Create Account</b></h3>

        <form id="myForm">
            
            <div class="w3-row-padding w3-margin-bottom">
                <div class="w3-half">
                    <input class="w3-input w3-border w3-round" type="text" placeholder="First Name" id="fname">
                </div>
                <div class="w3-half">
                    <input class="w3-input w3-border w3-round" type="text" placeholder="Last Name" id="lname">
                </div>
            </div>

            <div class="w3-padding w3-margin-bottom">
                <select class="w3-select w3-border w3-round" id="country">
                    <option value="" disabled selected>Select Country</option>
                    <option value="Indonesia">Indonesia</option>
                    <option value="Japan">Japan</option>
                    <option value="South Korea">South Korea</option>
                    <option value="China">China</option>
                </select>
            </div>

            <div class="w3-row-padding w3-margin-bottom">
                <div class="w3-half">
                    <input class="w3-input w3-border w3-round" type="email" placeholder="Email Address" id="email">
                </div>
                <div class="w3-half">
                    <input class="w3-input w3-border w3-round" type="tel" placeholder="Phone Number" id="phone">
                </div>
            </div>

            <div class="w3-row-padding w3-margin-bottom">
                <div class="w3-half">
                    <input class="w3-input w3-border w3-round" type="password" placeholder="Password" id="pwd">
                </div>
                <div class="w3-half">
                    <input class="w3-input w3-border w3-round" type="password" placeholder="Confirm Password" id="confPwd">
                </div>
            </div>

            <div class="w3-padding w3-margin-bottom">
                <input class="w3-check" type="checkbox" id="terms">
                <label for="terms"> Terms and Condition</label>
            </div>

            <div class="w3-center w3-margin-top">
                <button type="button" onclick="prosesForm()" class="w3-button w3-blue w3-round w3-padding-large">Create</button>
            </div>
        </form>
    </div>

    <div id="resultBox" class="w3-panel w3-light-grey w3-border w3-round w3-margin-top" style="display:none; padding:16px;">
        <h4><b>Hasil Isian Form:</b></h4>
        <p id="resultText"></p>
        <div id="passwordStatus" class="w3-panel w3-round"></div>
    </div>

</div>

<script>
    function prosesForm() {
        var firstName = document.getElementById("fname").value;
        var lastName = document.getElementById("lname").value;
        var country = document.getElementById("country").value;
        var email = document.getElementById("email").value;
        var phone = document.getElementById("phone").value;
        var pass1 = document.getElementById("pwd").value;
        var pass2 = document.getElementById("confPwd").value;

        var textHasil = 
            "<b>Name:</b> " + firstName + " " + lastName + "<br>" +
            "<b>Country:</b> " + country + "<br>" +
            "<b>Email:</b> " + email + "<br>" +
            "<b>Phone:</b> " + phone;
        
        document.getElementById("resultText").innerHTML = textHasil;

        var pwdStatusDiv = document.getElementById("passwordStatus");
        
        if (pass1 === pass2) {
            pwdStatusDiv.className = "w3-panel w3-green w3-round w3-padding";
            pwdStatusDiv.innerHTML = "<b>Keterangan:</b> Password SAMA dengan Confirm Password.";
        } else {
            pwdStatusDiv.className = "w3-panel w3-red w3-round w3-padding";
            pwdStatusDiv.innerHTML = "<b>Keterangan:</b> Password TIDAK SAMA dengan Confirm Password!";
        }

        document.getElementById("resultBox").style.display = "block";
    }
</script>

</body>
</html>
