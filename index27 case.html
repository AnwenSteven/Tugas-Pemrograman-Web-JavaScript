<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Javascript</title>
</head>
<body>
<script type="text/javascript">
    
    function tampilkanKata(kata, jumlah) {
        for (var i = 1; i <= jumlah; i++) {
            console.log(kata);
        }
    }

    var inputKata = prompt("Masukkan kata yang ingin ditampilkan:");
    var inputJumlah = prompt("Berapa kali kata tersebut ingin ditampilkan?");

    tampilkanKata(inputKata, inputJumlah);

</script>

</body>
</html>
