<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JavaScript</title>
</head>
<body>

    <img id="gambarTampil" src="https://static.wikia.nocookie.net/umamusume/images/d/dd/Special_Week_%28Race%29.png/revision/latest?cb=20240728214428" height="400" alt="Gambar Carousel">
    
    <br><br>

    <button onclick="mundur()">Mundur</button>
    <button onclick="maju()">Maju</button>

    <script type="text/javascript">
        var kumpulanGambar = [
            "https://static.wikia.nocookie.net/umamusume/images/d/dd/Special_Week_%28Race%29.png/revision/latest?cb=20240728214428",
            "https://static.wikia.nocookie.net/umamusume/images/c/c4/Silence_Suzuka_%28Race%29.png/revision/latest?cb=20240728212806",
            "https://static.wikia.nocookie.net/umamusume/images/0/04/Tokai_Teio_%28Race%29.png/revision/latest?cb=20240728220738"
        ];

        var indexAktif = 0;


        function maju() {
            indexAktif++; 
            
            if (indexAktif >= kumpulanGambar.length) {
                indexAktif = 0;
            }

            document.getElementById("gambarTampil").src = kumpulanGambar[indexAktif];
        }

        function mundur() {
            indexAktif--;

            if (indexAktif < 0) {
                indexAktif = kumpulanGambar.length - 1;
            }

            document.getElementById("gambarTampil").src = kumpulanGambar[indexAktif];
        }
    </script>

</body>
</html>
