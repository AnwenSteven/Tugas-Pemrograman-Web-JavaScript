<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JavaScript</title>
</head>

<body>
<script type="text/javascript">
    var user, computer;
    var userScore = 0;
    var computerScore = 0;

    for (var counter = 1; counter <= 3; counter++) {
        user = prompt('Ronde ' + counter + ': Pilih batu, gunting, atau kertas?');
        var random_value = Math.floor(Math.random() * 3 + 1 );

        if (random_value === 1) {
            computer = 'batu';
        } else if (random_value === 2) {
            computer = 'gunting';
        } else {
            computer = 'kertas';
        }

        var hasilRonde;

        if (user === computer) {
            hasilRonde = 'Draw';
        } else if (
            (user === 'batu' && computer === 'gunting') ||
            (user === 'gunting' && computer === 'kertas') ||
            (user === 'kertas' && computer === 'batu')
        ) {
            hasilRonde = 'User Wins';
            userScore++;
        } else {
            hasilRonde = 'Computer Wins';
            computerScore++;
        }

        console.log('User ' + user + ' Vs Computer ' + computer + ' = ' + hasilRonde);

    }
    
    if (userScore > computerScore) {
        console.log('User wins the game !');
    } else if (computerScore > userScore) {
        console.log('Computer wins the game !');
    } else {
        console.log('The game is a Draw !');
    }

</script>

</body>
</html>
